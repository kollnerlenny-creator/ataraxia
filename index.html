<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxis Ataraxia | Seelenruhe</title>
    <style>
        :root {
            --bg-color: #d1d9cf; /* Salbeigrüner Hintergrund */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-dark: #3a4d39; /* Dunkelgrüner Text */
            --accent-green: #4f6f52;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Flüssige Hintergrund-Elemente */
        .liquid-blob {
            position: fixed;
            z-index: -1;
            background: rgba(255, 255, 255, 0.3);
            filter: blur(40px);
            border-radius: 50%;
            animation: float 20s infinite alternate ease-in-out;
        }

        .blob-1 { width: 500px; height: 500px; top: -100px; right: -100px; }
        .blob-2 { width: 400px; height: 400px; bottom: -50px; left: -50px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.1); }
        }

        /* Header / Logo Bereich */
        header {
            text-align: center;
            padding: 4rem 1rem;
        }

        .logo-img {
            width: 80px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
        }

        h1.brand-name {
            font-size: 2.5rem;
            font-weight: 500;
            color: var(--accent-green);
        }

        .tagline {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 3rem;
        }

        /* Glass-Container Styling */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        /* Hero Button */
        .btn-start {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--glass-border);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-green);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .btn-start:hover {
            background: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        /* Team Section */
        .team-container {
            display: flex;
            gap: 2rem;
            max-width: 1000px;
            width: 90%;
            margin: 4rem 0;
        }

        .member {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
        }

        .member-info h3 {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }

        .member-info p {
            font-size: 0.9rem;
            line-height: 1.4;
            opacity: 0.9;
        }

        /* Zentrales Zitat/Banner */
        .quote-banner {
            width: 90%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 4rem;
        }

        .quote-banner h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--accent-green);
        }

        /* Footer Kontakt */
        footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 4rem;
        }

        .btn-contact {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            color: var(--accent-green);
            cursor: pointer;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .team-container { flex-direction: column; }
            h1.brand-name { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>

    <header>
        <div class="logo-area">
            <svg class="logo-img" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 20C40 20 30 25 25 35C20 45 20 55 25 65C30 75 40 80 50 80C60 80 70 75 75 65C80 55 80 45 75 35C70 25 60 20 50 20Z" stroke="#4f6f52" stroke-width="2"/>
                <path d="M30 85H70M50 80V95" stroke="#4f6f52" stroke-width="2"/>
            </svg>
            <h1 class="brand-name">Praxis Ataraxia</h1>
            <p class="tagline">Die Praxis für dein Leben</p>
        </div>

        <button class="btn-start">Beginnen Sie Ihre Reise</button>
    </header>

    <main>
        <div class="team-container">
            <div class="glass-card member">
                <div class="avatar-placeholder" style="width:120px; height:120px; background:#ccc; border-radius:50%;"></div>
                <div class="member-info">
                    <h3>Dr. Logos</h3>
                    <p>Meister der Diagnostik. Analysiert 'KENE DOXA' (Vanity). Bestimmt rationale Bedürfnisse.</p>
                </div>
            </div>

            <div class="glass-card member">
                <div class="avatar-placeholder" style="width:120px; height:120px; background:#ccc; border-radius:50%;"></div>
                <div class="member-info">
                    <h3>Mareike</h3>
                    <p>Philosophische Therapeutin. Embodied Autarkie. Fosters Minimalism.</p>
                </div>
            </div>
        </div>

        <div class="glass-card quote-banner">
            <h2>ATARAXIA: DER WEG ZUR SEELENRUHE</h2>
            <p>WIR FINDEN DIE KLARHEIT, DIE IHNEN FEHLT.</p>
        </div>
    </main>

    <footer>
        <button class="btn-contact">KONTAKTIEREN SIE UNS JETZT</button>
    </footer>

</body>
</html>
